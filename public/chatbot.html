<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack — FinBot AI Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e1a;--surface:#1a1632;--surface2:#211d3a;--border:#2a2550;
  --accent:#7c5af5;--accent2:#5bc8f5;--green:#4ecca3;--text:#e8e5ff;
  --text-dim:#9893c0;--text-mid:#c8c2f0;--sidebar:#130f2a;--orange:#f5954b;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ── Layout ── */
.shell{display:grid;grid-template-columns:56px 1fr;height:100vh}

/* ── Sidebar ── */
.sidebar{background:var(--sidebar);display:flex;flex-direction:column;align-items:center;padding:18px 0;gap:20px;border-right:1px solid var(--border)}
.s-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;text-decoration:none;transition:background .2s}
.s-icon:hover{background:#2a2550}
.s-icon.active{background:#4e3bbf}

/* ── Chat area ── */
.chat-area{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Header ── */
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.bot-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#5a3fde,#4ecca3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative}
.status-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#4ecca3;border-radius:50%;border:2px solid var(--surface)}
.bot-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.bot-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.header-actions{display:flex;gap:8px}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);padding:7px 10px;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.icon-btn:hover{border-color:var(--accent);color:var(--text)}

/* ── Quick chips ── */
.chip-bar{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--text-dim);cursor:pointer;background:transparent;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.chip:hover{border-color:var(--accent);color:var(--text);background:rgba(124,90,245,0.08)}

/* ── Messages ── */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── Message row ── */
.msg-row{display:flex;gap:10px;max-width:78%;animation:fadeUp .25s ease}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.bot{align-self:flex-start}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px}
.bot .msg-avatar{background:linear-gradient(135deg,#5a3fde,#4ecca3)}
.user .msg-avatar{background:rgba(124,90,245,0.25);border:1px solid rgba(124,90,245,0.4);color:#9a82fc;font-size:11px;font-weight:700}

.bubble{padding:11px 15px;border-radius:14px;font-size:13px;line-height:1.6;max-width:100%;word-break:break-word}
.bot .bubble{background:var(--surface);border:1px solid var(--border);color:var(--text-mid);border-top-left-radius:4px}
.user .bubble{background:var(--accent);color:#fff;border-top-right-radius:4px}

.msg-time{font-size:10px;color:var(--text-dim);margin-top:4px;display:block}
.user .msg-time{text-align:right}

/* ── Typing indicator ── */
.typing-row{display:flex;gap:10px;align-items:center;animation:fadeUp .2s ease}
.typing-bubble{background:var(--surface);border:1px solid var(--border);border-radius:14px;border-top-left-radius:4px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.dot-pulse{width:7px;height:7px;border-radius:50%;background:var(--text-dim);animation:pulse 1.2s infinite}
.dot-pulse:nth-child(2){animation-delay:.2s}
.dot-pulse:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.1);opacity:1}}

/* ── Input area ── */
.input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.msg-input{flex:1;background:var(--bg);border:1px solid #3a3565;border-radius:12px;color:var(--text);padding:11px 14px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:none;max-height:120px;min-height:42px;transition:border-color .2s;line-height:1.5}
.msg-input:focus{border-color:var(--accent)}
.msg-input::placeholder{color:#3a3565}
.send-btn{width:42px;height:42px;border-radius:12px;background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s;flex-shrink:0}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-hint{font-size:11px;color:var(--text-dim);margin-top:6px;text-align:center}

/* ── Suggested questions on welcome ── */
.welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin:0 auto;max-width:480px;text-align:center}
.welcome-icon{font-size:36px;margin-bottom:10px}
.welcome-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.welcome-sub{font-size:13px;color:var(--text-dim);margin-bottom:16px;line-height:1.5}
.suggest-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:left}
.suggest-btn{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text-mid);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;line-height:1.4;text-align:left}
.suggest-btn:hover{border-color:var(--accent);color:var(--text);background:rgba(124,90,245,0.06)}

/* ── Mobile ── */
@media(max-width:600px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .msg-row{max-width:90%}
  .suggest-grid{grid-template-columns:1fr}
  .chip-bar{padding:8px 12px}
  .input-area{padding:10px 12px}
  .messages{padding:12px}
}
</style>
</head>
<body>

<div class="shell">

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="index.html" class="s-icon" title="Home">🏠</a>
    <a href="reports.html" class="s-icon" title="Reports">🗒</a>
    <a href="groups.html" class="s-icon" title="Groups">👥</a>
    <a href="chatbot.html" class="s-icon active" title="AI Advisor">🤖</a>
    <a href="about.html" class="s-icon" title="About">📄</a>
  </div>

  <!-- Chat -->
  <div class="chat-area">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <div class="bot-avatar">🤖<div class="status-dot"></div></div>
        <div>
          <div class="bot-name">FinBot</div>
          <div class="bot-status">● Online · AI Financial Advisor</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="clearChat()" title="Clear chat">🗑 Clear</button>
        <button class="icon-btn" onclick="exportChat()" title="Export chat">⬇ Export</button>
      </div>
    </div>

    <!-- Quick chips -->
    <div class="chip-bar">
      <button class="chip" onclick="sendQuick('How can I save more this month?')">💰 Save more</button>
      <button class="chip" onclick="sendQuick('Should I invest in SIP or FD?')">📈 SIP vs FD</button>
      <button class="chip" onclick="sendQuick('How do I improve my credit score?')">🏦 Credit score</button>
      <button class="chip" onclick="sendQuick('Am I overspending on food?')">🍔 Food budget</button>
      <button class="chip" onclick="sendQuick('How do I reach my emergency fund goal faster?')">🎯 Goals</button>
      <button class="chip" onclick="sendQuick('What is my total spending this month?')">📊 My spending</button>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="msg-row bot" id="welcomeCard">
        <div class="msg-avatar">🤖</div>
        <div>
          <div class="welcome-card">
            <div class="welcome-icon">💰</div>
            <div class="welcome-title">Hi! I'm FinBot</div>
            <div class="welcome-sub">Your personal AI financial advisor. Ask me anything about your money, investments, or budgeting.</div>
            <div class="suggest-grid">
              <button class="suggest-btn" onclick="sendQuick('How do I reduce my monthly expenses?')">💸 How do I reduce my expenses?</button>
              <button class="suggest-btn" onclick="sendQuick('Is my credit score good?')">🏦 Is my credit score good?</button>
              <button class="suggest-btn" onclick="sendQuick('Where should I invest ₹5000?')">📈 Where should I invest ₹5000?</button>
              <button class="suggest-btn" onclick="sendQuick('What is an emergency fund?')">🛡️ What is an emergency fund?</button>
            </div>
          </div>
          <span class="msg-time">Just now</span>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <textarea class="msg-input" id="msgInput" placeholder="Ask FinBot anything about your finances..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">FinBot uses AI — always verify important financial decisions.</div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:5001/api/chat';
let isTyping = false;

// ── Auto-resize textarea ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Handle Enter key ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── Quick chip / suggestion buttons ──
function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

// ── Format time ──
function formatTime() {
  return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

// ── Scroll to bottom ──
function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// ── Append a message bubble ──
function appendMessage(role, text) {
  const isUser = role === 'user';
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : 'bot'}`;

  const avatarContent = isUser ? 'TA' : '🤖';
  const formattedText = formatText(text);

  row.innerHTML = `
    <div class="msg-avatar">${avatarContent}</div>
    <div>
      <div class="bubble">${formattedText}</div>
      <span class="msg-time">${formatTime()}</span>
    </div>`;

  document.getElementById('messages').appendChild(row);
  scrollBottom();
  return row;
}

// ── Format bot text: bold **word**, bullet points, line breaks ──
function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^[-•]\s(.+)/gm, '<span style="display:flex;gap:6px;margin-top:3px"><span style="color:#7c5af5;flex-shrink:0">•</span><span>$1</span></span>')
    .replace(/\n/g, '<br>');
}

// ── Show typing indicator ──
function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingIndicator';
  row.innerHTML = `
    <div class="msg-avatar bot-avatar" style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#5a3fde,#4ecca3);display:flex;align-items:center;justify-content:center;font-size:13px">🤖</div>
    <div class="typing-bubble">
      <div class="dot-pulse"></div>
      <div class="dot-pulse"></div>
      <div class="dot-pulse"></div>
    </div>`;
  document.getElementById('messages').appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ── Main send ──
async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  isTyping = true;

  appendMessage('user', text);
  showTyping();

  try {
    const res  = await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, sessionId: SESSION_ID })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) {
      appendMessage('bot', '❌ ' + data.error + '\n\nMake sure `chatbot-server.js` is running and your API key is set.');
    } else {
      appendMessage('bot', data.reply);
    }

  } catch (err) {
    hideTyping();
    appendMessage('bot', '❌ Could not reach the server.\n\nRun `node chatbot-server.js` in your terminal first.');
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

// ── Clear chat ──
const SESSION_ID = 'session_' + Date.now();
async function clearChat() {
  if (!confirm('Clear the entire conversation?')) return;
  try {
    await fetch(`http://localhost:5001/api/chat/history?sessionId=${SESSION_ID}`, { method: 'DELETE' });
  } catch (_) {}
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  // Re-add welcome card
  const welcomeRow = document.createElement('div');
  welcomeRow.className = 'msg-row bot';
  welcomeRow.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div>
      <div class="welcome-card">
        <div class="welcome-icon">💰</div>
        <div class="welcome-title">Chat cleared!</div>
        <div class="welcome-sub">Ready to help with your finances. What would you like to know?</div>
      </div>
      <span class="msg-time">${formatTime()}</span>
    </div>`;
  msgs.appendChild(welcomeRow);
}

// ── Export chat as text ──
function exportChat() {
  const rows = document.querySelectorAll('.msg-row');
  let output = 'FinTrack — FinBot Chat Export\n';
  output += new Date().toLocaleString('en-IN') + '\n';
  output += '='.repeat(40) + '\n\n';
  rows.forEach(row => {
    const isUser  = row.classList.contains('user');
    const bubble  = row.querySelector('.bubble');
    const time    = row.querySelector('.msg-time');
    if (bubble) {
      const role = isUser ? 'You' : 'FinBot';
      const text = bubble.innerText;
      const ts   = time ? time.innerText : '';
      output += `[${ts}] ${role}:\n${text}\n\n`;
    }
  });
  const blob = new Blob([output], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `finbot-chat-${Date.now()}.txt`;
  a.click();
}

// ── Load previous history on page open ──
async function loadHistory() {
  try {
    const res  = await fetch(`http://localhost:5001/api/chat/history?sessionId=${SESSION_ID}`);
    const data = await res.json();
    if (data && data.length) {
      data.forEach(h => appendMessage(h.role, h.content));
    }
  } catch (_) {}
}

// Focus input on load
document.getElementById('msgInput').focus();
</script>
<!-- FinBot Chat Button -->
<a href="/chatbot.html" style="
  position:fixed; bottom:24px; right:24px;
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(135deg,#7c5af5,#4ecca3);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; text-decoration:none; z-index:999;
  box-shadow:0 4px 20px rgba(124,90,245,0.4);
  transition:transform .2s;"
  onmouseover="this.style.transform='scale(1.1)'"
  onmouseout="this.style.transform='scale(1)'"
  title="Ask FinBot">🤖</a>
</body>
</html>
